name = "thumbnail-board-api"
main = "index.js"
compatibility_date = "2025-05-19"

[vars]
GITHUB_REPO = "AndreiNedelcu/thumbnail-board"
DATA_PATH   = "data.json"
BRANCH      = "main"

# Vector DB for the ideas-page (semantic search across past videos)
[[vectorize]]
binding    = "VECTORIZE"
index_name = "thumbnail-board"

# Discovery index: every video the scrape bot ever surfaces (filtered by
# niche + min_outlier_score) gets a lightweight embedding here, even if
# the user never approved it. Lets ideas.html find inspiration from the
# wider YouTube universe, not just the curated board.
[[vectorize]]
binding    = "VECTORIZE_DISCOVERY"
index_name = "thumbnail-discovery"

# Cloudflare Workers AI for embeddings (bge-m3 multilingual, 1024 dims)
[ai]
binding = "AI"

# Secrets (set with: wrangler secret put NAME)
#   GITHUB_TOKEN     — fine-grained PAT with Contents:write on this repo
#   AUTH_TOKEN       — random string, shared with frontend/extension
#   YOUTUBE_API_KEY  — YouTube Data API v3 key (Google Cloud Console)

# Scrape bot cron — runs the scheduled() handler every 6 hours.
[triggers]
crons = ["0 */6 * * *"]
