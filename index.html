<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thumbnail Board · theSeniorDev</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    /* theSeniorDev palette */
    --bg: #0d1117;
    --surface: #171e25;
    --surface2: #1e252c;
    --surface3: #272e35;
    --border: rgba(204,218,231,0.08);
    --border-hover: rgba(204,218,231,0.18);
    --text: #ccdae7;
    --text-bright: #ffffff;
    --muted: #6e7d8c;
    --mint: #3aecba;
    --purple: #524add;
    --turquoise: #26d5bf;
    --brand-grad: linear-gradient(135deg, #3aecba 0%, #524add 100%);
    --brand-grad-soft: linear-gradient(135deg, rgba(58,236,186,0.12) 0%, rgba(82,74,221,0.12) 100%);
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
    font-feature-settings: 'cv02','cv03','cv04','cv11';
    -webkit-font-smoothing: antialiased;
    position:relative;
  }
  /* Continuous ambient glow on the whole page (no clipping) */
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse 900px 600px at 15% -5%, rgba(58,236,186,0.12), transparent 55%),
      radial-gradient(ellipse 900px 600px at 85% 8%, rgba(82,74,221,0.14), transparent 55%);
  }
  body > * { position:relative; z-index:1; }
  /* SVG icons inherit color and align nicely */
  .icon { width:14px; height:14px; flex-shrink:0; }
  .icon-sm { width:12px; height:12px; }
  .icon-lg { width:16px; height:16px; }
  button, a { font-family:inherit; }

  /* ── CONTAINER (side margins) ── */
  .container { max-width:1600px; margin:0 auto; padding:0 clamp(20px, 5vw, 64px); }

  /* ── HERO ── */
  .hero {
    padding:96px 0 48px;
    text-align:center;
  }
  .hero-title {
    font-size:clamp(48px, 8vw, 96px);
    font-weight:900;
    letter-spacing:-3px;
    line-height:1;
    color:var(--text-bright);
    margin-bottom:18px;
  }
  .hero-title span {
    background:var(--brand-grad);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .hero-sub {
    font-size:17px; color:var(--text); opacity:.7;
    margin-bottom:40px; font-weight:400; letter-spacing:.2px;
  }
  .hero-search-wrap {
    max-width:680px; margin:0 auto;
    position:relative;
  }
  .hero-search-wrap .search-icon { position:absolute; left:22px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
  #search {
    width:100%;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px; color:var(--text-bright);
    font-family:inherit; font-size:16px; font-weight:500;
    padding:20px 52px 20px 56px; outline:none;
    transition:border-color .2s, box-shadow .2s, background .2s;
  }
  #search:focus {
    border-color:var(--mint);
    background:var(--surface2);
    box-shadow:0 0 0 4px rgba(58,236,186,0.10);
  }
  #search::placeholder { color:var(--muted); font-weight:400; }
  .clear-search {
    position:absolute; right:18px; top:50%; transform:translateY(-50%);
    background:var(--surface3); border:none; color:var(--muted); font-size:14px;
    cursor:pointer; display:none; line-height:1;
    width:26px; height:26px; border-radius:50%;
    align-items:center; justify-content:center;
    transition:all .15s;
  }
  .clear-search:hover { color:var(--text-bright); background:var(--mint); }
  .hero-stats {
    font-size:13px; color:var(--muted); margin-top:22px;
    font-weight:500; letter-spacing:.5px; text-transform:uppercase;
  }

  /* ── STICKY MINI HEADER (appears on scroll) ── */
  header {
    position:sticky; top:0; z-index:50;
    background:rgba(13,13,13,0.85); backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
    padding:10px 0;
    transform:translateY(-100%); transition:transform .25s ease;
  }
  header.visible { transform:translateY(0); }
  .header-top { display:flex; align-items:center; gap:12px; }
  .logo { font-size:14px; font-weight:800; letter-spacing:1.8px; white-space:nowrap; color:var(--text-bright); }
  .logo span { background:var(--brand-grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .mini-search-wrap { flex:1; position:relative; max-width:380px; margin:0 auto; }
  .mini-search-wrap .search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
  #mini-search {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-size:13px;
    padding:7px 32px 7px 32px; outline:none;
  }
  #mini-search:focus { border-color:#e94560; }
  .stats { font-size:11px; color:var(--muted); white-space:nowrap; font-weight:600; letter-spacing:.5px; text-transform:uppercase; }
  .tagger-btn {
    display:flex; align-items:center; gap:6px;
    padding:7px 14px; border-radius:10px;
    background:var(--surface2); border:1px solid var(--border);
    color:var(--text); font-family:inherit; font-size:12px; font-weight:600;
    text-decoration:none; white-space:nowrap; cursor:pointer;
    transition:all .15s;
  }
  .tagger-btn:hover { color:var(--text-bright); border-color:var(--mint); background:var(--surface3); }
  .tagger-btn.publish-primary {
    background:var(--brand-grad);
    border:none; color:#0d1117;
    font-weight:700;
  }
  .tagger-btn.publish-primary:hover {
    box-shadow:0 8px 24px rgba(58,236,186,0.25);
    transform:translateY(-1px);
    background:var(--brand-grad);
    color:#0d1117;
  }
  .select-btn.active {
    background:var(--brand-grad-soft);
    border-color:var(--mint);
    color:var(--mint);
  }
  .sel-delete-btn {
    background:#e94560 !important;
  }
  .card.selected {
    outline:2px solid var(--mint) !important;
  }
  .card.selected .sel-check {
    background:var(--mint) !important;
    border-color:var(--mint) !important;
  }
  .card.selected .sel-check::after { color:#0d1117 !important; }
  .broken-btn { display:none; align-items:center; gap:5px; padding:5px 12px; border-radius:7px; background:transparent; border:1px solid #e9456044; color:#e94560; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all .15s; }
  .broken-btn:hover { background:#e9456022; }
  .broken-btn.visible { display:flex; }

  /* ── SELECT MODE ── */
  .select-btn { display:flex; align-items:center; gap:5px; padding:5px 12px; border-radius:7px; background:var(--surface2); border:1px solid var(--border); color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all .15s; }
  .select-btn:hover { color:var(--text); border-color:rgba(255,255,255,.2); }
  .select-btn.active { background:#1a2a3a; border-color:#4fc3f7; color:#4fc3f7; }
  .sel-delete-btn { display:none; align-items:center; gap:5px; padding:5px 14px; border-radius:7px; background:#e94560; border:none; color:#fff; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; transition:all .15s; }
  .sel-delete-btn:hover { background:#c73050; }
  .sel-delete-btn.visible { display:flex; }

  /* Card selection state */
  body.select-mode .card { cursor:default; }
  body.select-mode .card:hover { transform:none; box-shadow:none; }
  body.select-mode .card:hover .card-overlay { opacity:0; }
  .card .sel-check {
    display:none; position:absolute; top:8px; right:8px; z-index:4;
    width:22px; height:22px; border-radius:50%; background:rgba(0,0,0,.55);
    border:2px solid rgba(255,255,255,.5); align-items:center; justify-content:center;
    transition:all .15s;
  }
  body.select-mode .card .sel-check { display:flex; }
  body.select-mode .card:hover .sel-check { border-color:#fff; background:rgba(0,0,0,.7); }
  .card.selected .sel-check { background:#4fc3f7; border-color:#4fc3f7; }
  .card.selected .sel-check::after {
    content:''; width:11px; height:11px;
    background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230d1117' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>") center/contain no-repeat;
  }
  .card.selected { outline:2px solid #4fc3f7; }
  body.select-mode .card:hover { outline:1px solid rgba(255,255,255,.3); }
  .size-wrap { display:flex; align-items:center; gap:8px; }
  .size-wrap svg { color:var(--muted); flex-shrink:0; }
  #size-slider { -webkit-appearance:none; appearance:none; width:90px; height:4px; background:var(--surface3); border-radius:2px; outline:none; cursor:pointer; }
  #size-slider::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--mint); cursor:pointer; box-shadow:0 0 8px rgba(58,236,186,0.4); }
  #size-slider::-moz-range-thumb { width:14px; height:14px; border-radius:50%; background:var(--mint); border:none; cursor:pointer; }

  /* ── TOOLBAR (above grid) ── */
  .toolbar {
    display:flex; align-items:center; gap:10px;
    padding:22px 0 18px; flex-wrap:wrap;
  }
  .toolbar-spacer { flex:1; }

  /* ── GRID ── */
  main { padding:0 0 60px; }
  #grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(var(--card-size,280px),1fr)); gap:18px; }
  .card {
    position:relative; overflow:hidden; border-radius:12px;
    background:var(--surface); cursor:pointer; aspect-ratio:16/9;
    transition:transform .2s, box-shadow .2s;
  }
  .card:hover { transform:translateY(-4px); box-shadow:0 16px 40px rgba(0,0,0,.5); z-index:2; }
  .card.broken { outline:2px solid #e9456055; }
  .card.broken::after { content:'unavailable'; position:absolute; top:8px; left:8px; background:#e94560; color:#fff; font-size:9px; font-weight:800; letter-spacing:1px; padding:3px 7px; border-radius:5px; text-transform:uppercase; }
  .card img { width:100%; height:100%; object-fit:cover; display:block; }
  .card-overlay {
    position:absolute; inset:0;
    background:linear-gradient(to top,rgba(0,0,0,.92) 0%,transparent 55%);
    opacity:0; transition:opacity .2s;
    display:flex; align-items:flex-end; padding:12px;
  }
  .card:hover .card-overlay { opacity:1; }
  .card-title { font-size:13px; font-weight:600; line-height:1.35; color:#fff; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  /* ── EMPTY ── */
  #empty { display:none; text-align:center; padding:80px 20px; color:var(--muted); }
  #empty h2 { font-size:20px; margin-bottom:8px; }

  /* ── LIGHTBOX ── */
  #lightbox { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.92); backdrop-filter:blur(10px); overflow-y:auto; padding:24px 16px; }
  #lightbox.open { display:block; }
  .lb-container { background:var(--surface); border-radius:18px; overflow:hidden; max-width:1000px; width:100%; margin:0 auto; box-shadow:0 40px 100px rgba(0,0,0,.9); }

  .lb-image-wrap { position:relative; aspect-ratio:16/9; background:#000; }
  #lb-img { width:100%; height:100%; object-fit:contain; display:block; }
  .lb-close { position:absolute; top:12px; right:12px; width:34px; height:34px; border-radius:50%; background:rgba(0,0,0,.75); border:none; color:#fff; font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; z-index:5; }
  .lb-close:hover { background:rgba(255,255,255,.2); }
  .lb-back { position:absolute; top:12px; left:12px; height:34px; padding:0 14px; border-radius:18px; background:rgba(0,0,0,.75); border:none; color:#fff; font-size:13px; font-weight:600; cursor:pointer; display:none; align-items:center; gap:5px; transition:background .2s; z-index:5; }
  .lb-back.visible { display:flex; }
  .lb-back:hover { background:rgba(255,255,255,.2); }
  .lb-nav { position:absolute; top:50%; transform:translateY(-50%); width:42px; height:42px; border-radius:50%; background:rgba(0,0,0,.7); border:none; color:#fff; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; z-index:5; }
  .lb-nav:hover { background:rgba(255,255,255,.2); }
  #lb-prev { left:12px; }
  #lb-next { right:12px; }

  .lb-body { padding:20px 24px; display:flex; flex-direction:column; gap:16px; }
  .lb-title { font-size:16px; font-weight:700; line-height:1.4; }
  .lb-meta-row { display:flex; align-items:center; gap:12px; margin-top:4px; flex-wrap:wrap; }
  .lb-channel { font-size:13px; color:var(--muted); }
  .lb-views { font-size:13px; color:var(--muted); display:flex; align-items:center; gap:4px; }
  .lb-views::before { content:'·'; }

  .lb-actions { display:flex; gap:8px; flex-wrap:wrap; }
  .lb-btn { display:flex; align-items:center; gap:7px; padding:9px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; transition:all .15s; text-decoration:none; white-space:nowrap; }
  .lb-btn-yt   { background:#ff0000; color:#fff; }
  .lb-btn-yt:hover { background:#cc0000; }
  .lb-btn-eagle { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .lb-btn-eagle:hover { background:var(--surface3); border-color:var(--border-hover); color:var(--text-bright); }
  .lb-btn-eagle.no-id { background:var(--surface2); color:var(--muted); cursor:not-allowed; }
  .lb-btn-copy  { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .lb-btn-copy:hover { background:var(--surface3); color:var(--text-bright); }
  .lb-btn-copy.copied { background:rgba(58,236,186,0.12); color:var(--mint); border-color:var(--mint); }
  .lb-btn-tagger {
    background:var(--brand-grad);
    color:#0d1117; border:none; font-weight:700;
  }
  .lb-btn-tagger:hover { box-shadow:0 6px 20px rgba(58,236,186,0.25); transform:translateY(-1px); }
  .lb-btn-delete { background:transparent; color:var(--muted); border:1px solid var(--border); margin-left:auto; }
  .lb-btn-delete:hover { background:rgba(233,69,96,0.08); color:#e94560; border-color:rgba(233,69,96,0.3); }

  /* Confirm modal */
  #confirm-modal { display:none; position:fixed; inset:0; z-index:400; background:rgba(0,0,0,.75); backdrop-filter:blur(6px); align-items:center; justify-content:center; }
  #confirm-modal.show { display:flex; }
  .confirm-box { background:#1a1a1a; border:1px solid rgba(255,255,255,.1); border-radius:14px; padding:28px 32px; max-width:380px; width:90%; text-align:center; box-shadow:0 24px 64px rgba(0,0,0,.6); }
  .confirm-box h3 { font-size:17px; font-weight:700; margin-bottom:8px; }
  .confirm-box p { font-size:13px; color:var(--muted); line-height:1.5; margin-bottom:22px; }
  .confirm-box p strong { color:var(--text); }
  .confirm-actions { display:flex; gap:10px; justify-content:center; }
  .confirm-cancel { padding:9px 22px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
  .confirm-cancel:hover { color:var(--text); }
  .confirm-delete { padding:9px 22px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; background:#e94560; color:#fff; border:none; }
  .confirm-delete:hover { background:#c73050; }
  .confirm-delete:disabled { opacity:.5; cursor:not-allowed; }

  .lb-tags-section h4, .lb-related h4 { font-size:11px; color:var(--muted); letter-spacing:1.2px; text-transform:uppercase; margin-bottom:10px; }
  .lb-tags-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .lb-tags-header h4 { margin-bottom:0; }
  .lb-add-tag-btn { background:none; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:2px 9px; font-size:11px; font-weight:600; cursor:pointer; transition:all .15s; }
  .lb-add-tag-btn:hover { color:var(--text); border-color:rgba(255,255,255,.3); }
  .lb-tag-search-wrap { display:none; margin-bottom:10px; position:relative; }
  .lb-tag-search-wrap.open { display:block; }
  .lb-tag-search { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; padding:7px 12px; outline:none; }
  .lb-tag-search:focus { border-color:#7c4dff55; }
  .lb-tag-suggestions { display:flex; flex-wrap:wrap; gap:5px; margin-top:7px; }
  .lb-tag-sug { padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600; cursor:pointer; background:var(--surface2); border:1px solid var(--border); color:var(--muted); transition:all .12s; }
  .lb-tag-sug:hover { color:var(--text); border-color:rgba(255,255,255,.3); }
  .lb-tags { display:flex; flex-wrap:wrap; gap:6px; }
  .lb-tag { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; transition:opacity .15s; border:1px solid transparent; display:flex; align-items:center; gap:5px; }
  .lb-tag:hover { opacity:.8; }
  .lb-tag-x { opacity:.6; font-size:13px; cursor:pointer; line-height:1; }
  .lb-tag-x:hover { opacity:1; }

  .lb-divider { border:none; border-top:1px solid var(--border); margin:0 -24px; }
  .related-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
  .related-card { aspect-ratio:16/9; border-radius:8px; overflow:hidden; background:var(--surface2); cursor:pointer; transition:transform .15s, box-shadow .15s; }
  .related-card:hover { transform:scale(1.04); box-shadow:0 6px 20px rgba(0,0,0,.5); }
  .related-card img { width:100%; height:100%; object-fit:cover; display:block; }

  /* ── TOAST ── */
  #toast {
    position:fixed; bottom:32px; left:50%; z-index:999;
    transform:translateX(-50%) translateY(16px);
    background:var(--surface);
    color:var(--text-bright);
    padding:12px 20px; border-radius:12px;
    font-family:inherit; font-size:13px; font-weight:600;
    opacity:0; transition:all .3s;
    pointer-events:none;
    border:1px solid var(--border);
    box-shadow:0 12px 40px rgba(0,0,0,0.4);
    white-space:nowrap;
    display:flex; align-items:center; gap:10px;
  }
  #toast svg { flex-shrink:0; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Sticky mini header (only shows when scrolled past hero) -->
<header id="mini-header">
  <div class="container">
    <div class="header-top">
      <div class="logo">THUMBNAIL<span>BOARD</span></div>
      <div class="mini-search-wrap">
        <svg class="search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="mini-search" type="text" placeholder="Search…" autocomplete="off">
      </div>
      <div class="stats" id="mini-stats"></div>
      <button class="tagger-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>
        Top
      </button>
    </div>
  </div>
</header>

<!-- Hero -->
<section class="hero">
  <div class="container">
    <h1 class="hero-title">THUMBNAIL<span>BOARD</span></h1>
    <p class="hero-sub">Explore reference thumbnails · curated by @theseniordev</p>
    <div class="hero-search-wrap">
      <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Search by tag, title, channel or keyword…" autocomplete="off">
      <button class="clear-search" id="clear-search" onclick="clearSearch()" title="Clear">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="hero-stats" id="stats"></div>
  </div>
</section>

<!-- Main content -->
<div class="container">
  <div class="toolbar">
    <div class="toolbar-spacer"></div>
    <div class="size-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <input id="size-slider" type="range" min="160" max="480" value="280" oninput="setCardSize(this.value)">
    </div>
    <button class="tagger-btn" id="shuffle-btn" onclick="shuffleVideos()" title="Randomise order">

<script>
// ── Category + subcategory config ────────────────────────────────
const CATS = {
  STYLE:     { color:'#e94560', bg:'#533483', subs:['style-colorful','style-high-contrast','style-minimal','style-split-screen','style-illustration','style-handdrawn','style-3d','style-photoshopped','style-collage','style-anatomy','style-busy','style-match-split','style-monochrome','style-pattern','style-dissolving','style-photo-composite'] },
  MOOD:      { color:'#4caf50', bg:'#2d6a2d', subs:['mood-dramatic','mood-happy','mood-serious','mood-entertaining','mood-confused','mood-exhausted','mood-frustrated','mood-sad','mood-surprised','mood-skeptical'] },
  TEXT:      { color:'#7c4dff', bg:'#4527a0', subs:['text-identity','text-callout','text-question','text-normative-claim','text-number','text-quote','text-forward-referencing','text-cta','text-in-center','text-in-background','text-direct-address','text-chat','text-answer'] },
  ELEMENT:   { color:'#ff6d00', bg:'#bf360c', subs:['element-celebrity','element-graphic','element-chart','element-unusual','element-glow','element-logo','element-screen','element-money','element-in-background','element-fire','element-hand','element-in-foreground','element-in-motion','element-obfuscation','element-eye','element-map','element-vehicle','element-pile','element-damage','element-animal','element-food','element-book','element-brain','element-crowd','element-emoji','element-notification','element-checkbox','element-review','element-building'] },
  CAMERA:    { color:'#00bcd4', bg:'#006064', subs:['camera-medium-shot','camera-close-up','camera-overhead-shot','camera-full-shot','camera-aerial-shot','camera-back-shot','camera-unusual'] },
  SUBJECT:   { color:'#ffab40', bg:'#e65100', subs:['subject-in-motion','subject-holding-object','subject-count-two','subject-count-many','subject-in-background','subject-unusual-pose','subject-talking','subject-laying','subject-sitting','subject-clone'] },
  FORMATION: { color:'#ab47bc', bg:'#6a1b9a', subs:['formation-flat-lay','formation-line','formation-grid','formation-v'] },
  TOPIC:     { color:'#26a69a', bg:'#004d40', subs:['topic-comparison','topic-product-showcase','topic-space','topic-secret','topic-social-media','topic-size'] },
  CALLOUT:   { color:'#d4e157', bg:'#827717', subs:['callout-magnifier'] },
  BACKDROP:  { color:'#ec407a', bg:'#880e4f', subs:['backdrop-dark','backdrop-light','backdrop-blurry'] },
};

function tagStyle(tag) {
  const p = tag.split('-')[0].toUpperCase();
  return CATS[p] || { color:'#888', bg:'#333' };
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── State ─────────────────────────────────────────────────────────
let allVideos = [], visibleVideos = [];
let shuffleOrder = null; // when set, an array of video IDs in shuffled order
let activeCategory = 'ALL';
let activeSubcat = null;
let searchQuery = '';
let currentIndex = 0;
let expandedCat = null;

// ── Init ──────────────────────────────────────────────────────────
async function init() {
  const res = await fetch('data.json?v=' + Date.now());
  allVideos = await res.json();

  // Dynamically extract custom tags from data.json
  allVideos.forEach(v => {
    (v.tags || []).forEach(tag => {
      const parts = tag.split('-');
      const cat = parts[0].toUpperCase();
      if (CATS[cat] && !CATS[cat].subs.includes(tag)) {
        CATS[cat].subs.push(tag);
      }
    });
  });

  if (typeof updateAllTags === 'function') updateAllTags();
  applyFilters();
}

// Show sticky mini-header when scrolled past hero
window.addEventListener('scroll', () => {
  const hero = document.querySelector('.hero');
  const mini = document.getElementById('mini-header');
  if (!hero || !mini) return;
  mini.classList.toggle('visible', hero.getBoundingClientRect().bottom < 0);
});

// Sync mini-search ↔ main search (both ways)
document.addEventListener('DOMContentLoaded', () => {
  const mini = document.getElementById('mini-search');
  if (mini) {
    mini.addEventListener('input', e => {
      const v = e.target.value;
      const main = document.getElementById('search');
      main.value = v;
      searchQuery = v;
      document.getElementById('clear-search').style.display = v ? '' : 'none';
      applyFilters();
    });
  }
});

// ── Category bar (no-op — kept for compatibility) ─────────────────
function buildCatBar() {
  const bar = document.getElementById('cat-bar');
  if (!bar) return;

  // ALL button
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn active';
  allBtn.textContent = 'ALL';
  allBtn.onclick = () => selectCategory('ALL', allBtn);
  bar.appendChild(allBtn);

  // Category buttons
  Object.entries(CATS).forEach(([cat, cfg]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = cat;
    btn.innerHTML = `${cat} <span class="arrow">›</span>`;
    btn.onclick = () => selectCategory(cat, btn);
    bar.appendChild(btn);
  });
}

function selectCategory(cat, btn) {
  // Update active button styles
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.remove('active', 'expanded');
    b.style.background = b.style.color = '';
  });

  if (cat === 'ALL') {
    btn.classList.add('active');
    activeCategory = 'ALL';
    activeSubcat = null;
    expandedCat = null;
    closeDrawer();
  } else {
    const cfg = CATS[cat];
    if (expandedCat === cat) {
      // Toggle off
      expandedCat = null;
      activeCategory = 'ALL';
      activeSubcat = null;
      document.querySelector('.cat-btn[data-cat="'+cat+'"]')?.classList.remove('active');
      closeDrawer();
    } else {
      expandedCat = cat;
      activeCategory = cat;
      activeSubcat = null;
      btn.classList.add('active', 'expanded');
      btn.style.background = cfg.bg;
      btn.style.color = '#fff';
      openDrawer(cat, cfg);
    }
  }
  applyFilters();
}

function openDrawer(cat, cfg) {
  const drawer = document.getElementById('subcat-drawer');
  drawer.innerHTML = cfg.subs.map(sub => {
    const label = sub.split('-').slice(1).join('-');
    return `<button class="sub-btn" data-sub="${sub}" style="border-color:${cfg.color}33"
      onclick="selectSubcat('${sub}', this, '${cfg.color}', '${cfg.bg}')">${label}</button>`;
  }).join('');
  drawer.classList.add('open');
}

function closeDrawer() {
  const drawer = document.getElementById('subcat-drawer');
  drawer.classList.remove('open');
  setTimeout(() => { drawer.innerHTML = ''; }, 260);
}

function selectSubcat(sub, btn, color, bg) {
  document.querySelectorAll('.sub-btn').forEach(b => {
    b.classList.remove('active'); b.style.background = ''; b.style.color = '';
  });
  if (activeSubcat === sub) {
    activeSubcat = null;
  } else {
    activeSubcat = sub;
    btn.classList.add('active');
    btn.style.background = bg;
    btn.style.color = '#fff';
  }
  applyFilters();
}

// ── Filtering ─────────────────────────────────────────────────────
function applyFilters() {
  const q = searchQuery.toLowerCase().trim();
  visibleVideos = allVideos.filter(v => {
    if (activeSubcat) {
      if (!v.tags.includes(activeSubcat)) return false;
    } else if (activeCategory !== 'ALL') {
      const p = activeCategory.toLowerCase();
      if (!v.tags.some(t => t.startsWith(p + '-') || t === p)) return false;
    }
    if (q) {
      const inT = v.title.toLowerCase().includes(q);
      const inC = (v.channel||'').toLowerCase().includes(q);
      const inG = v.tags.some(t => t.includes(q));
      if (!inT && !inC && !inG) return false;
    }
    return true;
  });
  // Apply shuffle order if active
  if (shuffleOrder) {
    const rank = new Map(shuffleOrder.map((id, i) => [id, i]));
    visibleVideos.sort((a, b) => {
      const ra = rank.has(a.id) ? rank.get(a.id) : 1e9;
      const rb = rank.has(b.id) ? rank.get(b.id) : 1e9;
      return ra - rb;
    });
  }
  renderGrid();
}

function shuffleVideos() {
  // Fisher-Yates shuffle of all video IDs — persists across filters
  const ids = allVideos.map(v => v.id);
  for (let i = ids.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [ids[i], ids[j]] = [ids[j], ids[i]];
  }
  shuffleOrder = ids;
  applyFilters();
}

function clearSearch() {
  document.getElementById('search').value = '';
  searchQuery = '';
  document.getElementById('clear-search').style.display = 'none';
  applyFilters();
}

// Track broken cards after images load
function updateBrokenBtn() {
  const count = document.querySelectorAll('.card.broken').length;
  const btn = document.getElementById('broken-btn');
  if (count > 0) {
    btn.innerHTML = `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Delete ${count} unavailable`;
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }
}
// Poll briefly after render to catch broken images
function scheduleBrokenCheck() {
  clearTimeout(window._brokenTimer);
  window._brokenTimer = setTimeout(updateBrokenBtn, 2500);
}

async function deleteAllBroken() {
  const broken = [...document.querySelectorAll('.card.broken')];
  if (!broken.length) return;
  const ids = broken.map(card => {
    const idx = [...document.querySelectorAll('.card')].indexOf(card);
    return visibleVideos[idx]?.id;
  }).filter(Boolean);
  if (!confirm(`Delete ${ids.length} unavailable thumbnails?`)) return;
  const apiBase = location.hostname === 'localhost' ? '' : 'http://localhost:3000';
  let deleted = 0;
  for (const id of ids) {
    try {
      const r = await fetch(`${apiBase}/api/delete`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({id})
      });
      const d = await r.json();
      if (d.ok) { const i = videos.findIndex(v => v.id === id); if (i !== -1) videos.splice(i, 1); deleted++; }
    } catch {}
  }
  applyFilters();
  showToast(`🗑 Deleted ${deleted} unavailable thumbnails`);
}

function setCardSize(val) {
  document.documentElement.style.setProperty('--card-size', val + 'px');
  localStorage.setItem('cardSize', val);
}
// Restore saved size
(function() {
  const saved = localStorage.getItem('cardSize');
  if (saved) { document.documentElement.style.setProperty('--card-size', saved + 'px'); document.getElementById('size-slider').value = saved; }
})();

// ── Grid ──────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const statsText = `${visibleVideos.length} thumbnails`;
  document.getElementById('stats').textContent = statsText;
  const miniStats = document.getElementById('mini-stats');
  if (miniStats) miniStats.textContent = statsText;

  if (!visibleVideos.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = visibleVideos.map((v, i) => `
    <div class="card${selectedIds.has(v.id) ? ' selected' : ''}" onclick="handleCardClick(event,${i},'${v.id}')">
      <div class="sel-check"></div>
      <img loading="lazy"
        src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg"
        onerror="this.onerror=null;this.src='https://img.youtube.com/vi/${v.id}/mqdefault.jpg';this.parentElement.classList.add('broken')"
        alt="${esc(v.title)}">
      <div class="card-overlay">
        <div class="card-title">${esc(v.title || v.id)}</div>
      </div>
    </div>`).join('');
  scheduleBrokenCheck();
}

// ── Lightbox ──────────────────────────────────────────────────────
function openLightbox(index) {
  currentIndex = index;
  lbHistory = []; // reset history when opening from grid (fresh session)
  renderLightbox();
  const lb = document.getElementById('lightbox');
  lb.classList.add('open');
  lb.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  lbHistory = []; // clear history on close
}

function navigate(dir) {
  currentIndex = Math.max(0, Math.min(visibleVideos.length - 1, currentIndex + dir));
  document.getElementById('lightbox').scrollTop = 0;
  renderLightbox();
}

function renderLightbox() {
  const v = visibleVideos[currentIndex];
  if (!v) return;

  const img = document.getElementById('lb-img');
  img.src = `https://img.youtube.com/vi/${v.id}/maxresdefault.jpg`;
  img.onerror = () => { img.src = `https://img.youtube.com/vi/${v.id}/mqdefault.jpg`; img.onerror = null; };

  document.getElementById('lb-title').textContent = v.title || v.id;
  document.getElementById('lb-channel').textContent = v.channel || '';
  document.getElementById('lb-views').textContent = v.views ? `${v.views} views` : '';
  document.getElementById('lb-yt').href = `https://www.youtube.com/watch?v=${v.id}`;

  // Eagle button — deep link via eagle:// URL scheme
  const eagleBtn = document.getElementById('lb-eagle');
  if (v.eid) {
    eagleBtn.classList.remove('no-id');
    eagleBtn.title = '';
    eagleBtn.onclick = () => {
      window.location.href = `eagle://item/${v.eid}`;
      showToast('Opening in Eagle…');
    };
  } else {
    eagleBtn.classList.add('no-id');
    eagleBtn.title = 'Eagle ID not available for this item';
    eagleBtn.onclick = () => showToast('Eagle ID not available for this thumbnail');
  }

  // Copy button
  const copyBtn = document.getElementById('lb-copy');
  copyBtn.className = 'lb-btn lb-btn-copy';
  copyBtn.innerHTML = `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy image`;
  copyBtn.onclick = () => copyImage(v.id, copyBtn);

  // Edit tags button — opens tagger at this specific video
  document.getElementById('lb-tagger').onclick = () => {
    const param = v.eid ? `eid=${v.eid}` : `vid=${v.id}`;
    window.open(`http://localhost:3000/tagger.html?${param}`, '_blank');
  };

  // Delete button
  document.getElementById('lb-delete').onclick = () => showDeleteConfirm(v.id, v.title || v.id);

  // Nav
  // Toggle back button based on history
  document.getElementById('lb-back').classList.toggle('visible', lbHistory.length > 0);
  document.getElementById('lb-prev').style.display = currentIndex > 0 ? '' : 'none';
  document.getElementById('lb-next').style.display = currentIndex < visibleVideos.length - 1 ? '' : 'none';

  // Tags — close search if open
  document.getElementById('lb-tag-search-wrap').classList.remove('open');
  document.getElementById('lb-tag-search').value = '';
  renderLbTags(v);

  // Related — sorted by shared tags count
  const tagSet = new Set(v.tags);
  const related = allVideos
    .filter(r => r.id !== v.id)
    .map(r => ({ v: r, score: r.tags.filter(t => tagSet.has(t)).length }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 20);

  document.getElementById('lb-related').innerHTML = related.map(x => `
    <div class="related-card" onclick="jumpTo('${x.v.id}')">
      <img loading="lazy" src="https://img.youtube.com/vi/${x.v.id}/mqdefault.jpg" alt="${esc(x.v.title)}">
    </div>`).join('');
}

// History stack of videoIds visited via "related" clicks within the lightbox
let lbHistory = [];

function jumpTo(videoId) {
  // Push current video onto history before navigating
  const currentVid = visibleVideos[currentIndex]?.id;
  if (currentVid && currentVid !== videoId) lbHistory.push(currentVid);

  const idx = visibleVideos.findIndex(v => v.id === videoId);
  if (idx !== -1) {
    currentIndex = idx;
  } else {
    // Not in current filter — reset and find globally
    activeCategory = 'ALL'; activeSubcat = null; expandedCat = null;
    document.querySelectorAll('.cat-btn').forEach(b => { b.classList.remove('active','expanded'); b.style.background = b.style.color = ''; });
    document.querySelector('.cat-btn')?.classList.add('active');
    if (typeof closeDrawer === 'function') closeDrawer();
    applyFilters();
    currentIndex = visibleVideos.findIndex(v => v.id === videoId);
  }
  document.getElementById('lightbox').scrollTop = 0;
  renderLightbox();
}

function lightboxBack() {
  if (!lbHistory.length) return;
  const prevId = lbHistory.pop();
  const idx = visibleVideos.findIndex(v => v.id === prevId);
  if (idx !== -1) {
    currentIndex = idx;
    document.getElementById('lightbox').scrollTop = 0;
    renderLightbox();
  }
}

function filterByTag(tag) {
  closeLightbox();
  document.getElementById('search').value = tag;
  document.getElementById('clear-search').style.display = '';
  searchQuery = tag;
  applyFilters();
}

// ── Copy image ────────────────────────────────────────────────────
async function copyImage(videoId, btn) {
  const url = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
  try {
    const image = new Image();
    image.crossOrigin = 'anonymous';
    await new Promise((res, rej) => { image.onload = res; image.onerror = rej; image.src = url + '?_=' + Date.now(); });
    const canvas = document.createElement('canvas');
    canvas.width = image.naturalWidth || 1280;
    canvas.height = image.naturalHeight || 720;
    canvas.getContext('2d').drawImage(image, 0, 0);
    await new Promise((res, rej) => {
      canvas.toBlob(async blob => {
        if (!blob) { rej(new Error('no blob')); return; }
        try { await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]); res(); }
        catch(e) { rej(e); }
      }, 'image/png');
    });
    btn.className = 'lb-btn lb-btn-copy copied';
    btn.innerHTML = `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
    showToast('Image copied to clipboard', 'success');
  } catch(e) {
    window.open(url, '_blank');
    showToast('Opened in new tab — right-click → Copy image');
  }
}

// ── Toast ─────────────────────────────────────────────────────────
// Toast with optional type for icon: 'success' | 'error' | 'info' (default)
const TOAST_ICONS = {
  success: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3aecba" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>',
  error:   '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6"/><path d="M9 9l6 6"/></svg>',
  info:    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ccdae7" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>'
};
function showToast(msg, type='info') {
  // auto-detect type from legacy emoji prefixes
  let m = String(msg).trim();
  if (/^[✅]/.test(m))      { type = 'success'; m = m.replace(/^✅\s*/, ''); }
  else if (/^[❌⚠️]/.test(m)) { type = 'error';   m = m.replace(/^[❌⚠️]\s*/, ''); }
  else if (/^[🗑]/.test(m))   { type = 'success'; m = m.replace(/^🗑\s*/, ''); }
  else if (/^[⏳]/.test(m))   { type = 'info';    m = m.replace(/^⏳\s*/, ''); }
  const t = document.getElementById('toast');
  t.innerHTML = (TOAST_ICONS[type] || '') + '<span>' + m.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'})[c]) + '</span>';
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Events ────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  document.getElementById('clear-search').style.display = searchQuery ? '' : 'none';
  const mini = document.getElementById('mini-search');
  if (mini) mini.value = searchQuery;
  applyFilters();
});
document.getElementById('lb-close').onclick = closeLightbox;
document.getElementById('lb-prev').onclick = () => navigate(-1);
document.getElementById('lb-next').onclick = () => navigate(1);
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

init();

// ── Tag editing in lightbox ───────────────────────────────────────
let ALL_TAGS = [];
function updateAllTags() {
  ALL_TAGS = Object.values(CATS).flatMap(c => c.subs);
}
updateAllTags();

function renderLbTags(v) {
  document.getElementById('lb-tags').innerHTML = (v.tags||[]).map(t => {
    const c = tagStyle(t);
    return `<span class="lb-tag" style="background:${c.bg};color:#fff;border-color:${c.color}44">
      <span onclick="filterByTag('${esc(t)}')">${esc(t)}</span>
      <span class="lb-tag-x" onclick="removeLbTag('${esc(t)}')">×</span>
    </span>`;
  }).join('');
}

function toggleTagSearch() {
  const wrap = document.getElementById('lb-tag-search-wrap');
  const inp = document.getElementById('lb-tag-search');
  const open = wrap.classList.toggle('open');
  if (open) { inp.focus(); updateTagSuggestions(''); }
}

function updateTagSuggestions(query) {
  const v = videos[currentIndex];
  const existing = new Set(v.tags||[]);
  const q = query.toLowerCase();
  const matches = ALL_TAGS.filter(t => !existing.has(t) && (!q || t.includes(q))).slice(0, 20);
  // also allow custom tag if typed something not in list
  const sugs = document.getElementById('lb-tag-suggestions');
  sugs.innerHTML = matches.map(t => {
    const c = tagStyle(t);
    return `<span class="lb-tag-sug" onclick="addLbTag('${t}')" style="border-color:${c.color}44;color:${c.color}">${t}</span>`;
  }).join('') + (q && !ALL_TAGS.includes(q) && !existing.has(q)
    ? `<span class="lb-tag-sug" onclick="addLbTag('${q}')" style="border-color:#7c4dff44;color:#7c4dff">+ "${q}"</span>`
    : '');
}

document.getElementById('lb-tag-search').addEventListener('input', e => updateTagSuggestions(e.target.value));
document.getElementById('lb-tag-search').addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('lb-tag-search-wrap').classList.remove('open');
});

async function addLbTag(tag) {
  const v = videos[currentIndex];
  if (!v || (v.tags||[]).includes(tag)) return;

  const parts = tag.split('-');
  const validPrefixes = new Set(Object.keys(CATS).map(k => k.toLowerCase()));
  if (!validPrefixes.has(parts[0])) {
    showToast('❌ El tag debe incluir una categoría (ej. style-nuevo)');
    return;
  }

  const newTags = [...(v.tags||[]), tag];
  await saveLbTags(v, newTags);
  document.getElementById('lb-tag-search').value = '';
  updateTagSuggestions('');
}

async function removeLbTag(tag) {
  const v = videos[currentIndex];
  if (!v) return;
  const newTags = (v.tags||[]).filter(t => t !== tag);
  await saveLbTags(v, newTags);
}

async function saveLbTags(v, newTags) {
  v.tags = newTags;
  renderLbTags(v);
  try {
    // Update Eagle if we have an eid
    if (v.eid) {
      const apiBase = location.hostname === 'localhost' ? '' : 'http://localhost:3000';
      await fetch(`${apiBase}/api/eagle/update`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({id: v.eid, tags: newTags})
      });
    }
    showToast('✅ Tags updated');
  } catch(e) {
    showToast('⚠️ Saved locally — start tagger.command to sync to Eagle');
  }
  applyFilters(); // re-render grid in background
}

// ── Publish ───────────────────────────────────────────────────────
const PUBLISH_BTN_HTML = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>Publish';
async function publishToGithub() {
  const btn = document.getElementById('publish-btn');
  btn.textContent = 'Publishing…';
  btn.style.pointerEvents = 'none';
  try {
    const r = await fetch('http://localhost:3000/api/publish', { method: 'POST' });
    const d = await r.json();
    if (d.ok) {
      showToast('Published to GitHub Pages!', 'success');
    } else {
      showToast(d.msg || 'Publish failed', 'error');
    }
  } catch {
    showToast('Server not running — open tagger.command first', 'error');
  } finally {
    btn.innerHTML = PUBLISH_BTN_HTML;
    btn.style.pointerEvents = '';
  }
}

// ── Select mode ───────────────────────────────────────────────────
let selectMode = false;
let selectedIds = new Set();

function toggleSelectMode() {
  selectMode = !selectMode;
  selectedIds.clear();
  document.body.classList.toggle('select-mode', selectMode);
  const btn = document.getElementById('select-btn');
  btn.classList.toggle('active', selectMode);
  const icon = document.getElementById('select-icon');
  const label = document.getElementById('select-label');
  if (selectMode) {
    icon.innerHTML = '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>';
    label.textContent = 'Cancel';
  } else {
    icon.innerHTML = '<rect x="3" y="3" width="18" height="18" rx="3"/>';
    label.textContent = 'Select';
  }
  updateSelBar();
  renderGrid();
}

function handleCardClick(e, index, videoId) {
  if (selectMode) {
    toggleCardSelect(videoId);
  } else {
    openLightbox(index);
  }
}

function toggleCardSelect(videoId) {
  if (selectedIds.has(videoId)) {
    selectedIds.delete(videoId);
  } else {
    selectedIds.add(videoId);
  }
  // Toggle .selected on the card element directly (no full re-render)
  const cards = document.querySelectorAll('.card');
  cards.forEach(card => {
    const vid = visibleVideos[Array.from(cards).indexOf(card)]?.id;
    if (vid) card.classList.toggle('selected', selectedIds.has(vid));
  });
  updateSelBar();
}

function updateSelBar() {
  const btn = document.getElementById('sel-delete-btn');
  const count = selectedIds.size;
  document.getElementById('sel-count').textContent = count;
  btn.classList.toggle('visible', selectMode && count > 0);
}

async function deleteSelected() {
  if (!selectedIds.size) return;
  const ids = [...selectedIds];
  if (!confirm(`Delete ${ids.length} selected thumbnail${ids.length > 1 ? 's' : ''}?`)) return;
  const apiBase = location.hostname === 'localhost' ? '' : 'http://localhost:3000';
  let deleted = 0;
  for (const id of ids) {
    try {
      const r = await fetch(`${apiBase}/api/delete`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      const d = await r.json();
      if (d.ok || (d.msg && d.msg.includes('not found'))) {
        const i = allVideos.findIndex(v => v.id === id);
        if (i !== -1) allVideos.splice(i, 1);
        deleted++;
      }
    } catch {}
  }
  selectedIds.clear();
  toggleSelectMode(); // exit select mode
  applyFilters();
  showToast(`🗑 Deleted ${deleted} thumbnail${deleted !== 1 ? 's' : ''}`);
}

// ── Delete ────────────────────────────────────────────────────────
let _deleteId = null;

function showDeleteConfirm(videoId, title) {
  _deleteId = videoId;
  document.getElementById('confirm-title').textContent = title || videoId;
  document.getElementById('confirm-modal').classList.add('show');
}

function hideDeleteConfirm() {
  _deleteId = null;
  document.getElementById('confirm-modal').classList.remove('show');
}

async function confirmDelete() {
  if (!_deleteId) return;
  const btn = document.getElementById('confirm-delete-btn');
  btn.disabled = true; btn.textContent = 'Deleting…';
  // Use relative URL when on localhost, absolute when on GitHub Pages
  const apiBase = location.hostname === 'localhost' ? '' : 'http://localhost:3000';
  try {
    const r = await fetch(`${apiBase}/api/delete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: _deleteId })
    });
    const d = await r.json();
    if (d.ok || (d.msg && d.msg.includes('not found'))) {
      // Remove from local array regardless — if server says not found, it's already gone
      const idx = videos.findIndex(v => v.id === _deleteId);
      if (idx !== -1) videos.splice(idx, 1);
      hideDeleteConfirm();
      closeLightbox();
      applyFilters();
      showToast('Thumbnail deleted');
    } else {
      showToast('❌ ' + (d.msg || 'Delete failed'));
    }
  } catch(e) {
    showToast('❌ Open http://localhost:3000 in your browser to use delete');
  } finally {
    btn.disabled = false; btn.textContent = 'Delete';
  }
}

document.getElementById('confirm-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('confirm-modal')) hideDeleteConfirm();
});
</script>

<div id="confirm-modal">
  <div class="confirm-box">
    <h3>Delete thumbnail?</h3>
    <p>This will remove <strong id="confirm-title"></strong> from the board. You can always re-add it by tagging it in Eagle.</p>
    <div class="confirm-actions">
      <button class="confirm-cancel" onclick="hideDeleteConfirm()">Cancel</button>
      <button class="confirm-delete" id="confirm-delete-btn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>
</body>
</html>
