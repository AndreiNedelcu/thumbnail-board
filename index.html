<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thumbnail Board</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #e94560;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(13,13,13,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--text);
    white-space: nowrap;
  }
  .logo span { color: var(--accent); }

  .search-wrap {
    flex: 1;
    position: relative;
    max-width: 500px;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  #search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    padding: 9px 12px 9px 36px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  .stats {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    margin-left: auto;
  }

  /* ── CATEGORY FILTERS ── */
  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface2);
    color: var(--muted);
    border-color: var(--border);
  }
  .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .filter-btn.active {
    color: #fff;
    border-color: transparent;
  }

  /* ── MAIN GRID ── */
  main {
    padding: 20px;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .card {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
    cursor: pointer;
    aspect-ratio: 16/9;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.6);
    z-index: 2;
  }
  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.2s;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 12px;
    gap: 6px;
  }
  .card:hover .card-overlay { opacity: 1; }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    line-height: 1.3;
    color: #fff;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .card-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.85);
    backdrop-filter: blur(4px);
  }

  /* ── EMPTY STATE ── */
  #empty {
    display: none;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  #empty h2 { font-size: 20px; margin-bottom: 8px; }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(8px);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #lightbox.open { display: flex; }

  .lb-container {
    background: var(--surface);
    border-radius: 16px;
    overflow: hidden;
    max-width: 900px;
    width: 100%;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 32px 80px rgba(0,0,0,0.8);
  }

  .lb-image-wrap {
    position: relative;
    aspect-ratio: 16/9;
    background: #000;
    flex-shrink: 0;
  }
  #lb-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .lb-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .lb-close:hover { background: rgba(255,255,255,0.2); }

  .lb-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .lb-nav:hover { background: rgba(255,255,255,0.2); }
  #lb-prev { left: 12px; }
  #lb-next { right: 12px; }

  .lb-body {
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .lb-title {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.4;
  }
  .lb-channel {
    font-size: 13px;
    color: var(--muted);
    margin-top: -10px;
  }

  .lb-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .lb-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 9px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    text-decoration: none;
  }
  .lb-btn-yt  { background: #ff0000; color: #fff; }
  .lb-btn-yt:hover  { background: #cc0000; }
  .lb-btn-eagle { background: #ff6b35; color: #fff; }
  .lb-btn-eagle:hover { background: #e85a25; }
  .lb-btn-copy  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .lb-btn-copy:hover { background: #2a2a2a; }
  .lb-btn-copy.copied { background: #1a3a1a; color: #4caf50; border-color: #4caf50; }

  .lb-tags-section h4 {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .lb-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .lb-tag {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    border: 1px solid transparent;
  }
  .lb-tag:hover { opacity: 0.75; }

  /* toast */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #222;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    border: 1px solid var(--border);
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">THUMBNAIL<span>BOARD</span></div>
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Search by tag, title or channel…" autocomplete="off">
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="filters" id="filters"></div>
</header>

<main>
  <div id="grid"></div>
  <div id="empty">
    <h2>No results</h2>
    <p>Try a different search or clear the filters</p>
  </div>
</main>

<!-- Lightbox -->
<div id="lightbox">
  <div class="lb-container">
    <div class="lb-image-wrap">
      <img id="lb-img" src="" alt="">
      <button class="lb-close" id="lb-close">✕</button>
      <button class="lb-nav" id="lb-prev">‹</button>
      <button class="lb-nav" id="lb-next">›</button>
    </div>
    <div class="lb-body">
      <div>
        <div class="lb-title" id="lb-title"></div>
        <div class="lb-channel" id="lb-channel"></div>
      </div>
      <div class="lb-actions">
        <a class="lb-btn lb-btn-yt" id="lb-yt" href="#" target="_blank">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>
          Open in YouTube
        </a>
        <button class="lb-btn lb-btn-eagle" id="lb-eagle">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Open in Eagle
        </button>
        <button class="lb-btn lb-btn-copy" id="lb-copy">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy image
        </button>
      </div>
      <div class="lb-tags-section">
        <h4>Tags</h4>
        <div class="lb-tags" id="lb-tags"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Category config ──────────────────────────────────────────────
const CATEGORIES = {
  STYLE:     { color: '#e94560', bg: '#533483' },
  MOOD:      { color: '#4caf50', bg: '#2d6a2d' },
  TEXT:      { color: '#7c4dff', bg: '#4527a0' },
  ELEMENT:   { color: '#ff6d00', bg: '#bf360c' },
  CAMERA:    { color: '#00bcd4', bg: '#006064' },
  SUBJECT:   { color: '#ffab40', bg: '#e65100' },
  FORMATION: { color: '#ab47bc', bg: '#6a1b9a' },
  TOPIC:     { color: '#26a69a', bg: '#004d40' },
  CALLOUT:   { color: '#d4e157', bg: '#827717' },
  BACKDROP:  { color: '#ec407a', bg: '#880e4f' },
};

function getCategory(tag) {
  const prefix = tag.split('-')[0].toUpperCase();
  return CATEGORIES[prefix] ? prefix : 'OTHER';
}
function tagColor(tag) {
  const cat = getCategory(tag);
  return CATEGORIES[cat] || { color: '#888', bg: '#333' };
}

// ── State ─────────────────────────────────────────────────────────
let allVideos = [];
let filteredVideos = [];
let activeCategory = 'ALL';
let searchQuery = '';
let currentIndex = 0;
let visibleVideos = [];

// ── Load data ────────────────────────────────────────────────────
async function init() {
  const res = await fetch('data.json');
  allVideos = await res.json();
  buildFilters();
  applyFilters();
}

// ── Filters ───────────────────────────────────────────────────────
function buildFilters() {
  const container = document.getElementById('filters');
  const cats = ['ALL', ...Object.keys(CATEGORIES)];
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === 'ALL' ? ' active' : '');
    btn.textContent = cat;
    if (cat !== 'ALL' && CATEGORIES[cat]) {
      btn.style.setProperty('--cat-color', CATEGORIES[cat].color);
      if (cat === activeCategory) {
        btn.style.background = CATEGORIES[cat].bg;
        btn.style.color = '#fff';
      }
    }
    btn.onclick = () => setCategory(cat, btn);
    container.appendChild(btn);
  });
}

function setCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = '';
    b.style.color = '';
  });
  btn.classList.add('active');
  if (cat !== 'ALL' && CATEGORIES[cat]) {
    btn.style.background = CATEGORIES[cat].bg;
    btn.style.color = '#fff';
  }
  applyFilters();
}

function applyFilters() {
  const q = searchQuery.toLowerCase().trim();
  filteredVideos = allVideos.filter(v => {
    if (activeCategory !== 'ALL') {
      const prefix = activeCategory.toLowerCase();
      if (!v.tags.some(t => t.startsWith(prefix + '-') || t === prefix)) return false;
    }
    if (q) {
      const inTitle = v.title.toLowerCase().includes(q);
      const inChannel = (v.channel || '').toLowerCase().includes(q);
      const inTag = v.tags.some(t => t.includes(q));
      if (!inTitle && !inChannel && !inTag) return false;
    }
    return true;
  });
  renderGrid();
}

// ── Grid ──────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const stats = document.getElementById('stats');

  visibleVideos = filteredVideos;
  stats.textContent = `${filteredVideos.length} thumbnails`;

  if (filteredVideos.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filteredVideos.map((v, i) => {
    const topTags = v.tags.slice(0, 3);
    const tagPills = topTags.map(t => {
      const c = tagColor(t);
      return `<span class="card-tag" style="background:${c.bg}88">${t}</span>`;
    }).join('');
    return `
      <div class="card" data-index="${i}" onclick="openLightbox(${i})">
        <img loading="lazy"
             src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg"
             onerror="this.src='https://img.youtube.com/vi/${v.id}/mqdefault.jpg'"
             alt="${escHtml(v.title)}">
        <div class="card-overlay">
          <div class="card-title">${escHtml(v.title || v.id)}</div>
          <div class="card-tags">${tagPills}</div>
        </div>
      </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Lightbox ──────────────────────────────────────────────────────
function openLightbox(index) {
  currentIndex = index;
  showLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function showLightbox() {
  const v = visibleVideos[currentIndex];
  if (!v) return;

  const img = document.getElementById('lb-img');
  img.src = `https://img.youtube.com/vi/${v.id}/maxresdefault.jpg`;
  img.onerror = () => { img.src = `https://img.youtube.com/vi/${v.id}/mqdefault.jpg`; };

  document.getElementById('lb-title').textContent = v.title || v.id;
  document.getElementById('lb-channel').textContent = v.channel || '';
  document.getElementById('lb-yt').href = `https://www.youtube.com/watch?v=${v.id}`;

  // Eagle button
  document.getElementById('lb-eagle').onclick = () => openInEagle(v.id);

  // Copy button
  const copyBtn = document.getElementById('lb-copy');
  copyBtn.classList.remove('copied');
  copyBtn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy image`;
  copyBtn.onclick = () => copyImage(v.id, copyBtn);

  // Tags
  const tagsEl = document.getElementById('lb-tags');
  tagsEl.innerHTML = v.tags.map(t => {
    const c = tagColor(t);
    return `<span class="lb-tag" style="background:${c.bg}; color:#fff; border-color:${c.color}44"
      onclick="filterByTag('${t}')">${t}</span>`;
  }).join('');

  // Nav arrows
  document.getElementById('lb-prev').style.display = currentIndex > 0 ? '' : 'none';
  document.getElementById('lb-next').style.display = currentIndex < visibleVideos.length - 1 ? '' : 'none';
}

function navigate(dir) {
  currentIndex = Math.max(0, Math.min(visibleVideos.length - 1, currentIndex + dir));
  showLightbox();
}

function filterByTag(tag) {
  closeLightbox();
  document.getElementById('search').value = tag;
  searchQuery = tag;
  applyFilters();
}

async function copyImage(videoId, btn) {
  try {
    const url = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
    const res = await fetch(url);
    const blob = await res.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
    showToast('Image copied to clipboard');
  } catch(e) {
    showToast('Could not copy — try right-clicking the image');
  }
}

async function openInEagle(videoId) {
  try {
    // Search Eagle for this video by URL
    const res = await fetch(`http://localhost:41595/api/item/list?limit=5&keyword=${videoId}`);
    const data = await res.json();
    const item = data.data?.[0];
    if (item?.id) {
      window.open(`eagle://item/open?id=${item.id}`, '_self');
    } else {
      showToast('Not found in Eagle library');
    }
  } catch(e) {
    showToast('Eagle not running or not reachable');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Events ────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  applyFilters();
});

document.getElementById('lb-close').onclick = closeLightbox;
document.getElementById('lb-prev').onclick = () => navigate(-1);
document.getElementById('lb-next').onclick = () => navigate(1);

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

init();
</script>
</body>
</html>
