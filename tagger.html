<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<title>Thumbnail Tagger · theSeniorDev</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="api-client.js"></script>
<style>
  :root {
    --bg:#0d1117; --surface:#171e25; --surface2:#1e252c; --surface3:#272e35;
    --border:rgba(204,218,231,0.08); --text:#ccdae7; --text-bright:#ffffff; --muted:#6e7d8c;
    --mint:#3aecba; --purple:#524add;
    --brand-grad:linear-gradient(135deg,#3aecba 0%,#524add 100%);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }
  body {
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--bg); color:var(--text);
    display:flex; flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }

  /* HEADER */
  header { flex-shrink:0; padding:11px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; background:rgba(13,13,13,.97); }
  .logo { font-size:14px; font-weight:800; letter-spacing:2px; white-space:nowrap; color:var(--text-bright); }
  .logo span { background:var(--brand-grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .progress-wrap { flex:1; max-width:260px; }
  .progress-bar { height:4px; background:var(--surface3); border-radius:2px; overflow:hidden; margin-bottom:4px; }
  .progress-fill { height:100%; background:var(--brand-grad); border-radius:2px; transition:width .4s; }
  .progress-label { font-size:11px; color:var(--muted); }
  .header-actions { display:flex; gap:6px; margin-left:auto; align-items:center; }
  .btn { padding:6px 13px; border-radius:7px; font-size:12px; font-weight:600; cursor:pointer; border:none; transition:all .15s; white-space:nowrap; }
  .btn-ghost { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
  .btn-ghost:hover:not(:disabled) { color:var(--text); }
  .btn-ghost:disabled { opacity:.3; cursor:not-allowed; }
  .btn-save { background:var(--brand-grad); color:#0d1117; padding:6px 16px; font-weight:700; }
  .btn-save:hover:not(:disabled) { box-shadow:0 6px 20px rgba(58,236,186,0.25); transform:translateY(-1px); }
  .btn-save:disabled { background:var(--surface3); color:var(--muted); cursor:not-allowed; }
  .btn-eagle { background:var(--surface2); color:#7c4dff; border:1px solid #7c4dff44; }
  .btn-eagle:hover:not(:disabled) { background:#7c4dff22; }
  .btn-eagle:disabled { opacity:.3; cursor:not-allowed; }

  /* LAYOUT */
  main { flex:1; min-height:0; display:grid; grid-template-columns:1fr 360px; overflow:hidden; }

  /* LEFT — never scrolls */
  .thumb-panel { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; gap:12px; border-right:1px solid var(--border); background:var(--surface); overflow:hidden; }
  .thumb-img { max-width:100%; max-height:52vh; border-radius:10px; box-shadow:0 16px 48px rgba(0,0,0,.6); object-fit:contain; flex-shrink:0; }
  .thumb-title { font-size:14px; font-weight:600; line-height:1.4; text-align:center; max-width:500px; }
  .thumb-meta { font-size:12px; color:var(--muted); display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .thumb-link { font-size:12px; color:#7c4dff; text-decoration:none; }
  .thumb-link:hover { text-decoration:underline; }
  .sel-wrap { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; max-width:520px; }
  .sel-tag { padding:3px 9px; border-radius:12px; font-size:11px; font-weight:600; display:flex; align-items:center; gap:4px; }
  .sel-tag .x { cursor:pointer; opacity:.7; font-size:12px; }
  .sel-tag .x:hover { opacity:1; }

  /* RIGHT — scrolls */
  .tag-panel { overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:14px; }
  .tag-panel::-webkit-scrollbar { width:4px; }
  .tag-panel::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:2px; }

  .cat-section {}
  .cat-title { font-size:10px; font-weight:800; letter-spacing:2px; text-transform:uppercase; margin-bottom:7px; display:flex; align-items:center; gap:6px; color:var(--muted); }
  .cat-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .tag-grid { display:flex; flex-wrap:wrap; gap:5px; }
  .tag-btn { padding:5px 13px; border-radius:14px; font-size:12.5px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--surface2); color:var(--muted); transition:all .12s; }
  .tag-btn:hover { color:var(--text); border-color:rgba(255,255,255,.2); }
  .tag-btn.selected { color:#fff; border-color:transparent; }

  /* Custom tag — hidden input, revealed on click */
  .cat-title { cursor:default; }
  .cat-add-btn { margin-left:auto; background:none; border:none; color:var(--muted); font-size:10px; font-weight:700; letter-spacing:.5px; cursor:pointer; padding:1px 5px; border-radius:5px; transition:color .12s, background .12s; }
  .cat-add-btn:hover { color:var(--text); background:var(--surface3); }
  .custom-tag-row { display:none; gap:5px; margin-top:7px; }
  .custom-tag-row.open { display:flex; }
  .custom-tag-input { flex:1; background:var(--surface3); border:1px solid var(--border); border-radius:7px; color:var(--text); font-size:11px; padding:4px 9px; outline:none; }
  .custom-tag-input:focus { border-color:#7c4dff55; }
  .custom-tag-input::placeholder { color:var(--muted); }
  .custom-tag-add { padding:4px 10px; background:var(--surface3); border:1px solid var(--border); border-radius:7px; color:var(--muted); font-size:12px; cursor:pointer; transition:all .12s; }
  .custom-tag-add:hover { color:var(--text); }

  /* LOADING / DONE */
  #loading { display:flex; flex:1; align-items:center; justify-content:center; flex-direction:column; gap:10px; }
  .spinner { width:26px; height:26px; border:3px solid var(--border); border-top-color:var(--mint); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #done-screen { display:none; flex:1; align-items:center; justify-content:center; flex-direction:column; gap:14px; }
  #done-screen.show { display:flex; }

  /* TOAST */
  #toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(12px); background:var(--surface); color:var(--text-bright); padding:10px 18px; border-radius:10px; font-size:13px; font-weight:600; opacity:0; transition:all .25s; pointer-events:none; border:1px solid var(--border); z-index:99; white-space:nowrap; display:flex; align-items:center; gap:9px; box-shadow:0 10px 30px rgba(0,0,0,.4); }
  #toast svg { flex-shrink:0; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">THUMBNAIL<span>TAGGER</span></div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
    <div class="progress-label" id="plabel">Loading…</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" id="btn-back" onclick="goBack()" disabled>← Back</button>
    <button class="btn btn-ghost" onclick="skip()">Skip →</button>
    <button class="btn btn-eagle" id="btn-eagle" onclick="openInEagle()" disabled title="Open in Eagle">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg>
      Eagle
    </button>
    <button class="btn btn-save" id="btn-save" onclick="saveTags()" disabled>Save tags</button>
  </div>
</header>

<div id="loading">
  <div class="spinner"></div>
  <p id="load-msg" style="color:var(--muted);font-size:13px">Connecting to Eagle…</p>
</div>

<main id="main" style="display:none">
  <div class="thumb-panel">
    <img class="thumb-img" id="timg" src="" alt="">
    <div class="thumb-title" id="ttitle"></div>
    <div class="thumb-meta">
      <span id="tviews"></span>
      <a class="thumb-link" id="turl" href="#" target="_blank">
        Open in YouTube
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-left:2px"><path d="M7 7h10v10"/><path d="m7 17 10-10"/></svg>
      </a>
    </div>
    <div class="sel-wrap" id="sel-tags"></div>
  </div>
  <div class="tag-panel" id="tag-panel"></div>
</main>

<div id="done-screen">
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="url(#sparkleGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <defs><linearGradient id="sparkleGrad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#3aecba"/><stop offset="1" stop-color="#524add"/></linearGradient></defs>
    <path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/>
    <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
  </svg>
  <h2 style="font-size:21px;font-weight:700">All tagged!</h2>
  <p style="color:var(--muted);font-size:14px;text-align:center">Every thumbnail has official tags now.<br>Website syncs automatically.</p>
  <a href="/" style="margin-top:8px;color:#7c4dff;font-size:13px;text-decoration:none;border:1px solid #7c4dff44;padding:6px 16px;border-radius:8px">← Back to Thumbnail Board</a>
</div>

<div id="toast"></div>

<script>
// All calls go through our local server proxy (avoids CORS issues with Eagle POST)
const SERVER = '';  // same origin: http://localhost:3000
const FOLDER = 'MPBRJ4DRT0IR0';

const CATS = {
  STYLE:     { color:'#e94560', bg:'#533483', subs:['colorful','high-contrast','minimal','split-screen','illustration','handdrawn','3d','photoshopped','collage','anatomy','busy','match-split','monochrome','pattern','dissolving','photo-composite'] },
  MOOD:      { color:'#4caf50', bg:'#2d6a2d', subs:['dramatic','happy','serious','entertaining','confused','exhausted','frustrated','sad','surprised','skeptical'] },
  TEXT:      { color:'#7c4dff', bg:'#4527a0', subs:['identity','callout','question','normative-claim','number','quote','forward-referencing','cta','in-center','in-background','direct-address','chat','answer'] },
  ELEMENT:   { color:'#ff6d00', bg:'#bf360c', subs:['celebrity','graphic','chart','unusual','glow','logo','screen','money','in-background','fire','hand','in-foreground','in-motion','obfuscation','eye','map','vehicle','pile','damage','animal','food','book','brain','crowd','emoji','notification','checkbox','review','building'] },
  CAMERA:    { color:'#00bcd4', bg:'#006064', subs:['medium-shot','close-up','overhead-shot','full-shot','aerial-shot','back-shot','unusual'] },
  SUBJECT:   { color:'#ffab40', bg:'#e65100', subs:['in-motion','holding-object','count-two','count-many','in-background','unusual-pose','talking','laying','sitting','clone'] },
  FORMATION: { color:'#ab47bc', bg:'#6a1b9a', subs:['flat-lay','line','grid','v'] },
  TOPIC:     { color:'#26a69a', bg:'#004d40', subs:['comparison','product-showcase','space','secret','social-media','size'] },
  CALLOUT:   { color:'#d4e157', bg:'#827717', subs:['magnifier'] },
  BACKDROP:  { color:'#ec407a', bg:'#880e4f', subs:['dark','light','blurry'] },
  CHANNEL:   { color:'#00bcd4', bg:'#006064', subs:['theseniordev-main','theseniordev-podcast'] },
};
const VALID = new Set(Object.keys(CATS).map(k => k.toLowerCase()));
const isOfficial = t => VALID.has(t.split('-')[0]);

let queue = [], history = [], idx = 0, current = null;
let selected = new Set();
let totalAll = 0, preTagged = 0;
const savedSelections = {};  // eagle item id → Set of selected tags

// ── Load all items via server proxy (MCP → all 2006 items) ───────
function extractVid(item) {
  const s = (item.url||'') + ' ' + (item.annotation||'');
  const m = s.match(/(?:watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

async function loadItems() {
  msg('Loading items…');
  try {
    // Load all items from data.json (source of truth — works on localhost and cloud)
    const dataResp = await fetch(`${SERVER}/data.json?v=${Date.now()}`)
      .catch(() => fetch(`${SERVER}/api/data`));
    if (!dataResp.ok) throw new Error(`HTTP ${dataResp.status}`);
    const boardData = await dataResp.json();

    // Normalise: tagger items reuse "id" (videoId) and synthesise a YouTube URL
    const items = boardData.map(v => ({
      id: v.eid || v.id,                                   // Eagle id if present, else videoId
      name: v.title || v.id,
      url: `https://www.youtube.com/watch?v=${v.id}`,
      annotation: `Channel: ${v.channel || ''}\nViews: ${v.views || ''}\nhttps://www.youtube.com/watch?v=${v.id}`,
      tags: v.tags || [],
      _videoId: v.id,
    }));
    msg(`Loaded ${items.length} items…`);

    // Extract custom tags to global CATS
    items.forEach(item => {
      (item.tags || []).forEach(t => {
        const parts = t.split('-');
        const cat = parts[0].toUpperCase();
        const sub = parts.slice(1).join('-');
        if (CATS[cat] && !CATS[cat].subs.includes(sub)) {
          CATS[cat].subs.push(sub);
        }
      });
    });

    const isDone = i => (i.tags || []).some(isOfficial);
    totalAll = items.length;
    preTagged = items.filter(isDone).length;

    // Jump to specific item?  ?eid= or ?vid=
    const params = new URLSearchParams(location.search);
    const jumpEid = params.get('eid');
    const jumpVid = params.get('vid');

    if (jumpEid || jumpVid) {
      queue = [...items];
      const jumpIdx = items.findIndex(i =>
        (jumpEid && i.id === jumpEid) ||
        (jumpVid && i._videoId === jumpVid)
      );
      idx = jumpIdx >= 0 ? jumpIdx : 0;
      if (idx >= 0 && queue[idx]) {
        savedSelections[queue[idx].id] = new Set(queue[idx].tags || []);
      }
    } else {
      queue = items.filter(i => !isDone(i));
      idx = 0;
    }
    buildPanel();
    render();
  } catch(e) {
    msg(`Cannot reach data source (${e.message}).`);
  }
}

function msg(t) { document.getElementById('load-msg').textContent = t; }

// ── Build tag panel ───────────────────────────────────────────────
function buildPanel() {
  const panel = document.getElementById('tag-panel');
  panel.innerHTML = '';
  Object.entries(CATS).forEach(([cat, cfg]) => {
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.dataset.cat = cat;

    const tagsHtml = cfg.subs.map(sub => tagBtnHtml(`${cat.toLowerCase()}-${sub}`, sub, cfg)).join('');

    sec.innerHTML = `
      <div class="cat-title">
        <span class="cat-dot" style="background:${cfg.color}"></span>${cat}
        <button class="cat-add-btn" onclick="toggleCustomInput('${cat}')">+ add</button>
      </div>
      <div class="tag-grid" id="grid-${cat}">${tagsHtml}</div>
      <div class="custom-tag-row" id="custom-row-${cat}">
        <input class="custom-tag-input" id="inp-${cat}" placeholder="e.g. neon"
          onkeydown="if(event.key==='Enter'){addCustomTag('${cat}');event.preventDefault();}">
        <button class="custom-tag-add" onclick="addCustomTag('${cat}')">Add</button>
      </div>`;
    panel.appendChild(sec);
  });
}

function tagBtnHtml(full, label, cfg) {
  return `<button class="tag-btn" data-tag="${full}"
    onclick="toggle('${full}',this,'${cfg.bg}','${cfg.color}')">${label}</button>`;
}

function toggleCustomInput(cat) {
  const row = document.getElementById(`custom-row-${cat}`);
  const inp = document.getElementById(`inp-${cat}`);
  const isOpen = row.classList.toggle('open');
  if (isOpen) { inp.focus(); }
}

function addCustomTag(cat) {
  const inp = document.getElementById(`inp-${cat}`);
  const raw = inp.value.trim().toLowerCase().replace(/\s+/g,'-');
  if (!raw) return;
  const full = `${cat.toLowerCase()}-${raw}`;
  // Add button to grid if not already there
  const grid = document.getElementById(`grid-${cat}`);
  if (!grid.querySelector(`[data-tag="${full}"]`)) {
    const cfg = CATS[cat];
    grid.insertAdjacentHTML('beforeend', tagBtnHtml(full, raw, cfg));
    if (!CATS[cat].subs.includes(raw)) CATS[cat].subs.push(raw);
  }
  // Auto-select it
  const btn = document.querySelector(`[data-tag="${full}"]`);
  if (btn && !selected.has(full)) toggle(full, btn, CATS[cat].bg, CATS[cat].color);
  inp.value = '';
  // Close the input row
  document.getElementById(`custom-row-${cat}`).classList.remove('open');
}

// ── Render current item ───────────────────────────────────────────
function render() {
  document.getElementById('loading').style.display = 'none';

  if (!queue.length || idx >= queue.length) {
    document.getElementById('main').style.display = 'none';
    document.getElementById('done-screen').classList.add('show');
    return;
  }

  current = queue[idx];
  // Pre-load: saved selection > existing Eagle tags > empty
  selected = savedSelections[current.id]
    ? new Set(savedSelections[current.id])
    : new Set(current.tags || []);
  document.getElementById('main').style.display = 'grid';

  // Image — prefer pre-computed _videoId
  const vid = current._videoId || (current.url||current.annotation||'').match(/(?:watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/)?.[1] || null;
  const img = document.getElementById('timg');
  if (vid) {
    img.src = `https://img.youtube.com/vi/${vid}/maxresdefault.jpg`;
    img.onerror = () => { img.src = `https://img.youtube.com/vi/${vid}/mqdefault.jpg`; img.onerror=null; };
    document.getElementById('turl').href = `https://www.youtube.com/watch?v=${vid}`;
  }
  document.getElementById('ttitle').textContent = current.name || '';
  const vm = (current.annotation||'').match(/Views:\s*([\d.KMB]+)/);
  const tv = document.getElementById('tviews');
  if (vm) {
    tv.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>' + vm[1];
  } else { tv.textContent = ''; }

  // Create buttons for any existing tags not in the predefined list
  selected.forEach(tag => {
    if (!document.querySelector(`.tag-btn[data-tag="${tag}"]`)) {
      const parts = tag.split('-');
      const cat = parts[0].toUpperCase();
      const sub = parts.slice(1).join('-');
      const cfg = CATS[cat] || { color:'#888', bg:'#333' };
      const grid = document.getElementById(`grid-${cat}`);
      if (grid) grid.insertAdjacentHTML('beforeend', tagBtnHtml(tag, sub, cfg));
    }
  });

  // Reset + re-apply selected state on buttons
  document.querySelectorAll('.tag-btn').forEach(b => {
    const tag = b.dataset.tag;
    if (selected.has(tag)) {
      const cat = tag.split('-')[0].toUpperCase();
      const cfg = CATS[cat] || {};
      b.classList.add('selected');
      b.style.background = cfg.bg||''; b.style.color='#fff'; b.style.borderColor='transparent';
    } else {
      b.classList.remove('selected'); b.style.cssText='';
    }
  });
  refreshSelTags();
  refreshProgress();
  refreshBtns();
}

function refreshSelTags() {
  document.getElementById('sel-tags').innerHTML = [...selected].map(t => {
    const cat = t.split('-')[0].toUpperCase();
    const cfg = CATS[cat] || {bg:'#333',color:'#888'};
    return `<span class="sel-tag" style="background:${cfg.bg};color:#fff">${t} <span class="x" onclick="untag('${t}')">×</span></span>`;
  }).join('');
}

function refreshProgress() {
  const done = preTagged + idx;
  const pct = totalAll ? Math.round(done/totalAll*100) : 0;
  document.getElementById('pfill').style.width = pct+'%';
  document.getElementById('plabel').textContent =
    `${queue.length - idx} to tag · ${done}/${totalAll} done (${pct}%)`;
}

function refreshBtns() {
  // Allow save if tags changed vs original, or if anything is selected
  const orig = new Set(current?.tags || []);
  const changed = selected.size !== orig.size || [...selected].some(t => !orig.has(t)) || [...orig].some(t => !selected.has(t));
  document.getElementById('btn-save').disabled = !changed && selected.size === 0;
  document.getElementById('btn-back').disabled = history.length === 0;
  document.getElementById('btn-eagle').disabled = !current;
}

// ── Tag toggle ────────────────────────────────────────────────────
function toggle(tag, btn, bg, color) {
  if (selected.has(tag)) {
    selected.delete(tag);
    btn.classList.remove('selected'); btn.style.cssText='';
  } else {
    selected.add(tag);
    btn.classList.add('selected');
    btn.style.background=bg; btn.style.color='#fff'; btn.style.borderColor='transparent';
  }
  if (current) savedSelections[current.id] = new Set(selected);
  refreshSelTags(); refreshBtns();
}

function untag(tag) {
  selected.delete(tag);
  const btn = document.querySelector(`.tag-btn[data-tag="${tag}"]`);
  if (btn) { btn.classList.remove('selected'); btn.style.cssText=''; }
  if (current) savedSelections[current.id] = new Set(selected);
  refreshSelTags(); refreshBtns();
}

// ── Navigation ────────────────────────────────────────────────────
function skip()   { if (current) savedSelections[current.id] = new Set(selected); history.push(idx); idx++; render(); }
function goBack() { if (current) savedSelections[current.id] = new Set(selected); if (history.length) { idx = history.pop(); render(); } }

// ── Open in Eagle ─────────────────────────────────────────────────
function openInEagle() {
  if (!current) return;
  window.location.href = `eagle://item/${current.id}`;
}

// ── Publish to GitHub ─────────────────────────────────────────────
// publishToGithub kept as no-op safety net; auto-publish handles every save.
async function publishToGithub() {
  try {
    const r = await fetch(`${SERVER}/api/publish`, { method:'POST' });
    const d = await r.json();
    if (d.ok) toast(d.msg || 'Published', 'success');
    else toast(d.msg || 'Publish failed', 'error');
  } catch(e) { toast(e.message, 'error'); }
}

// ── Save ──────────────────────────────────────────────────────────
async function saveTags() {
  if (!current) return;
  const btn = document.getElementById('btn-save');
  btn.disabled=true; btn.textContent='Saving…';

  const newTags = [...selected];
  const vid = current._videoId || (current.url||'').match(/[?&]v=([A-Za-z0-9_-]{11})/)?.[1] || null;
  try {
    const r = await TBApi.fetch('/api/update', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        id: current.id, vid, tags: newTags,
        name: current.name || '', channel: '', views: ''
      })
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    if (d.ok || d.status === 'success') {
      current.tags = newTags;
      history.push(idx); idx++;
      toast(`${selected.size} tag${selected.size>1?'s':''} saved`, 'success');
      render();
    } else { throw new Error(d.msg || d.message || JSON.stringify(d)); }
  } catch(e) {
    toast(e.message || 'Save failed', 'error');
  } finally { btn.textContent='Save tags'; refreshBtns(); }
}

const TOAST_ICONS = {
  success: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3aecba" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>',
  error:   '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6"/><path d="M9 9l6 6"/></svg>',
  info:    ''
};
function toast(msg, type='info') {
  let m = String(msg).trim();
  if (/^[✅]/.test(m))         { type = 'success'; m = m.replace(/^✅\s*/, ''); }
  else if (/^[❌⚠️]/.test(m))    { type = 'error';   m = m.replace(/^[❌⚠️]\s*/, ''); }
  const t = document.getElementById('toast');
  t.innerHTML = (TOAST_ICONS[type] || '') + '<span>' + m.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'})[c]) + '</span>';
  t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'), 3000);
}

document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT') return;
  if (e.key==='Enter') saveTags();
  if (e.key==='ArrowRight') skip();
  if (e.key==='ArrowLeft') goBack();
});

buildPanel();
loadItems();
</script>
